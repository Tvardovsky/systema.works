<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SYSTEMA - Personalized Solutions for Business</title>

  <style>
  :root { --brand: #18345e; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fff;
    overflow: hidden; /* убираем случайный вертикальный скролл */
  }

  /* динамический viewport для мобильных */
  .wrap {
    min-height: 100vh;
    min-height: 100svh; /* stable viewport height (лучше для мобилок) */
    min-height: 100dvh; /* dynamic viewport height (современные браузеры) */
    display: grid;
    place-items: center;
    padding: 16px;      /* безопасные отступы */
    box-sizing: border-box;
  }

  .stack {
    display: grid;
    justify-items: center;
    gap: 16px;
  }

  /* responsive размер: от очень маленьких до десктопа */
  .logo {
    width: clamp(220px, 62vw, 360px);
    aspect-ratio: 1 / 1;
  }

  dotlottie-wc {
    display: block;
    width: 100%;
    height: 100%;
  }

  .social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .social a {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    text-decoration: none;

    color: var(--brand);
    border: 1px solid rgba(24,52,94,.18);
    background: rgba(24,52,94,.06);

    transition: transform .15s ease, background .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .social a:active { transform: translateY(0); }

  .social a:hover {
    transform: translateY(-2px);
    background: rgba(24,52,94,.10);
    border-color: rgba(24,52,94,.28);
  }

  .social svg {
    width: 22px;
    height: 22px;
    display: block;
    fill: currentColor;
  }

  @media (max-width: 420px) {
    .social a { width: 42px; height: 42px; }
    .social svg { width: 21px; height: 21px; }
  }
</style>

  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.11/dist/dotlottie-wc.js"></script>
</head>

<body>
  <main class="wrap">
    <section class="stack" aria-label="Systema">
      <div class="logo">
        <dotlottie-wc
          src="/assets/systema.json"
          type="lottie"
          autoplay
          loop
          speed="1.5"
        ></dotlottie-wc>
      </div>

      <nav class="social" aria-label="Contact Us">
        <!-- Facebook -->
        <a href="https://www.facebook.com/systemaworksagency" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">

          </svg>
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/systema.works" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm10 2H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3z"/>
            <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
            <path d="M17.5 6.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
          </svg>
        </a>

        <!-- Telegram -->
        <a href="https://t.me/systema_works_channel" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.4 15.5 9.2 19c.4 0 .6-.2.9-.4l2.2-2.1 4.6 3.4c.8.4 1.4.2 1.6-.8l2.9-13.6c.3-1.2-.5-1.7-1.3-1.4L2.8 9.3c-1.1.4-1.1 1.1-.2 1.4l4.4 1.4L17.4 6.6c.5-.3 1-.1.6.2L9.4 15.5z"/>

          </svg>

      </nav>
    </section>
  </main>
</body>
</html>
